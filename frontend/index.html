<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrailGuard DEM</title>
    <style>
      html, body, #root { margin: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; }
      .shell { display: grid; grid-template-columns: 340px 1fr; height: 100%; }
      .sidebar { padding: 16px; border-right: 1px solid #ddd; overflow: auto; background: #fafafa; }
      .map-wrap { position: relative; }
      #map { width: 100%; height: 100%; }
      .card { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
      .row { display: flex; justify-content: space-between; gap: 8px; }
      .small { font-size: 12px; color: #555; }
      .mono { font-family: monospace; font-size: 12px; word-break: break-all; }
      label { display: block; margin-bottom: 8px; }
    </style>
    <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
